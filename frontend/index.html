<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-brand">💰 FinTrack</div>
        <div class="nav-links">
            <button onclick="showSection('dashboard')" class="nav-btn active" id="btn-dashboard">Dashboard</button>
            <button onclick="showSection('transactions')" class="nav-btn" id="btn-transactions">Transacciones</button>
            <button onclick="showSection('categories')" class="nav-btn" id="btn-categories">Categorías</button>
        </div>
    </nav>

    <main>
        <!-- DASHBOARD -->
        <section id="dashboard" class="section">
            <div class="section-header">
                <h1>Dashboard</h1>
                <div class="date-filters">
                    <select id="filter-month">
                        <option value="1">Enero</option>
                        <option value="2">Febrero</option>
                        <option value="3">Marzo</option>
                        <option value="4">Abril</option>
                        <option value="5">Mayo</option>
                        <option value="6">Junio</option>
                        <option value="7">Julio</option>
                        <option value="8">Agosto</option>
                        <option value="9">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                    <select id="filter-year"></select>
                    <button onclick="loadDashboard()" class="btn-primary">Aplicar</button>
                </div>
            </div>

            <div class="cards">
                <div class="card income">
                    <span class="card-label">Ingresos</span>
                    <span class="card-value" id="total-income">$0</span>
                </div>
                <div class="card expense">
                    <span class="card-label">Gastos</span>
                    <span class="card-value" id="total-expense">$0</span>
                </div>
                <div class="card balance">
                    <span class="card-label">Balance</span>
                    <span class="card-value" id="total-balance">$0</span>
                </div>
            </div>

            <div class="charts">
                <div class="chart-box">
                    <h3>Gastos por categoría</h3>
                    <canvas id="chart-expenses"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Ingresos vs Gastos</h3>
                    <canvas id="chart-summary"></canvas>
                </div>
            </div>
        </section>

        <!-- TRANSACCIONES -->
        <section id="transactions" class="section hidden">
            <div class="section-header">
                <h1>Transacciones</h1>
                <button onclick="openModal('modal-transaction')" class="btn-primary">+ Nueva</button>
            </div>

            <div class="filters">
                <select id="tx-filter-type" onchange="loadTransactions()">
                    <option value="">Todos los tipos</option>
                    <option value="income">Ingresos</option>
                    <option value="expense">Gastos</option>
                </select>
                <select id="tx-filter-category" onchange="loadTransactions()">
                    <option value="">Todas las categorías</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Tipo</th>
                        <th>Monto</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="transactions-list"></tbody>
            </table>
        </section>

        <!-- CATEGORÍAS -->
        <section id="categories" class="section hidden">
            <div class="section-header">
                <h1>Categorías</h1>
                <button onclick="openModal('modal-category')" class="btn-primary">+ Nueva</button>
            </div>
            <div id="categories-list" class="categories-grid"></div>
        </section>
    </main>

    <!-- MODAL TRANSACCIÓN -->
    <div id="modal-transaction" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nueva Transacción</h2>
                <button onclick="closeModal('modal-transaction')" class="btn-close">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="tx-id">
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="tx-type">
                        <option value="income">Ingreso</option>
                        <option value="expense">Gasto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Monto</label>
                    <input type="number" id="tx-amount" placeholder="0.00" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="tx-description" placeholder="Descripción">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="tx-category"></select>
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="datetime-local" id="tx-date">
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('modal-transaction')" class="btn-secondary">Cancelar</button>
                <button onclick="saveTransaction()" class="btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL CATEGORÍA -->
    <div id="modal-category" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nueva Categoría</h2>
                <button onclick="closeModal('modal-category')" class="btn-close">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="cat-id">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="cat-name" placeholder="Nombre de la categoría">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="cat-type">
                        <option value="expense">Gasto</option>
                        <option value="income">Ingreso</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <input type="color" id="cat-color" value="#6366f1">
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('modal-category')" class="btn-secondary">Cancelar</button>
                <button onclick="saveCategory()" class="btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="js/app.js"></script>
</body>
</html>
