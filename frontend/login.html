<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://img.icons8.com/skeuomorphism/32/idea.png"/>
    <title>Caudal — Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.28s ease both;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.75rem;
        }

        .auth-logo-icon {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .auth-logo-text {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-1);
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            font-size: 0.875rem;
            color: var(--text-2);
            margin-bottom: 1.75rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .auth-divider {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-3);
            margin: 0.5rem 0;
        }

        .auth-switch {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-2);
            margin-top: 1.25rem;
        }

        .auth-switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .auth-error {
            background: var(--expense-dim);
            border: 1px solid var(--expense);
            color: var(--expense);
            padding: 0.65rem 0.875rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }

        .btn-primary-full {
            width: 100%;
            padding: 0.7rem;
            font-size: 0.95rem;
        }

        .theme-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--bg-2);
            border: 1px solid var(--border);
            color: var(--text-2);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .theme-btn:hover { background: var(--bg-3); color: var(--text-1); }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">◑</button>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="auth-logo-text">CAUDAL</span>
            </div>

            <!-- LOGIN -->
            <div id="view-login">
                <h1 class="auth-title">¡Tus finanzas organizadas!</h1>
                <p class="auth-subtitle">Inicio de sesión</p>
                <div class="auth-form">
                    <div id="login-error" class="auth-error hidden"></div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="login-email" placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="login-password" placeholder="••••••••"
                            onkeydown="if(event.key==='Enter') submitLogin()">
                    </div>
                    <button class="btn-primary btn-primary-full" onclick="submitLogin()">
                        Iniciar sesión
                    </button>
                </div>
                <div class="auth-switch">
                    ¿No tenés cuenta? <a onclick="showView('register')">Registrate</a>
                </div>
            </div>

            <!-- REGISTER -->
            <div id="view-register" class="hidden">
                <h1 class="auth-title">Crear cuenta</h1>
                <p class="auth-subtitle">Empezá a gestionar tus finanzas</p>
                <div class="auth-form">
                    <div id="register-error" class="auth-error hidden"></div>
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="register-name" placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="register-email" placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="register-password" placeholder="Mínimo 6 caracteres"
                            onkeydown="if(event.key==='Enter') submitRegister()">
                    </div>
                    <button class="btn-primary btn-primary-full" onclick="submitRegister()">
                        Crear cuenta
                    </button>
                </div>
                <div class="auth-switch">
                    ¿Ya tenés cuenta? <a onclick="showView('login')">Iniciá sesión</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000/api'

        function toggleTheme() {
            const html = document.documentElement
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
            html.setAttribute('data-theme', next)
            localStorage.setItem('theme', next)
            document.getElementById('theme-btn').textContent = next === 'dark' ? '◑' : '◐'
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark'
            document.documentElement.setAttribute('data-theme', saved)
            document.getElementById('theme-btn').textContent = saved === 'dark' ? '◑' : '◐'
        }

        function showView(name) {
            document.getElementById('view-login').classList.add('hidden')
            document.getElementById('view-register').classList.add('hidden')
            document.getElementById(`view-${name}`).classList.remove('hidden')
        }

        function showError(id, msg) {
            const el = document.getElementById(id)
            el.textContent = msg
            el.classList.remove('hidden')
        }

        function hideError(id) {
            document.getElementById(id).classList.add('hidden')
        }

        async function submitLogin() {
            hideError('login-error')
            const email = document.getElementById('login-email').value.trim()
            const password = document.getElementById('login-password').value

            if (!email || !password) return showError('login-error', 'Completá todos los campos')

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })
                const data = await res.json()
                if (!res.ok) return showError('login-error', data.detail || 'Error al iniciar sesión')

                localStorage.setItem('fintrack-token', data.access_token)
                localStorage.setItem('fintrack-user', JSON.stringify(data.user))
                window.location.href = '/'
            } catch (e) {
                showError('login-error', 'Error de conexión con el servidor')
            }
        }

        async function submitRegister() {
            hideError('register-error')
            const name = document.getElementById('register-name').value.trim()
            const email = document.getElementById('register-email').value.trim()
            const password = document.getElementById('register-password').value

            if (!name || !email || !password) return showError('register-error', 'Completá todos los campos')
            if (password.length < 6) return showError('register-error', 'La contraseña debe tener al menos 6 caracteres')

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                })
                const data = await res.json()
                if (!res.ok) return showError('register-error', data.detail || 'Error al registrarse')

                localStorage.setItem('fintrack-token', data.access_token)
                localStorage.setItem('fintrack-user', JSON.stringify(data.user))
                window.location.href = '/'
            } catch (e) {
                showError('register-error', 'Error de conexión con el servidor')
            }
        }

        // Si ya está logueado, redirigir al app
        if (localStorage.getItem('fintrack-token')) {
            window.location.href = '/'
        }

        initTheme()
    </script>
</body>
</html>
